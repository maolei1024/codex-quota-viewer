services:
  codex-quota-viewer:
    image: docker.nexus.ixuni.win/codex-quota-viewer:latest
    container_name: codex-quota-viewer
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /data
      LISTEN_ADDR: :8080
      STALE_AFTER_MINUTES: "30"
      WEEKLY_RESET_NOTIFY_URL: https://mlntfy.project.k3s.ixuni.win/api/notifications/simple/send/mlNtfy
      WEEKLY_RESET_NOTIFY_STATE_DIR: /state
      WEEKLY_RESET_NOTIFY_TIMEOUT_SECONDS: "10"
    volumes:
      - ${HOME}/.antigravity_cockpit:/data:ro
      - ${HOME}/.antigravity_cockpit/codex_quota_viewer_state:/state
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
